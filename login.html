<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <title>Billing App</title>
</head>
<body>

    <div class="row ">
        <div class="col-6">
            <img src="./assets/images/Visaka-white-logo.png" style="background-color: black; width: 100%;">
        </div>
        <div class="col-6" style="padding: 2%; display: flex; align-items: center; justify-content: center;"  >
            <div class="card" style="padding: 40px; display: flex; width: 80%; ">
                <p>Welcome to Billing Soft</p>
                <h2 style="align-items: center; ">Login</h2>
                <form action="" onsubmit="login(event)">
                <div class="mb-3">
                    <label for="loginEmail"  class="form-label">Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" class="form-control" aria-describedby="emailHelp">
                    <p id="emailHelp" class="form-text" style="color: brown;"></p>
                </div>
                <div class="mb-3">
                    <label for="password"  class="form-label">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" class="form-control">
                    <div id="passwordHelp" style="color: brown;"></div>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="loginErrorMessage" style="color: brown;"></p>
            </div>
            </form>
        </div>
    </div>


    
    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
