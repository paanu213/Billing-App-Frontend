<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
    <title>Billing App</title>
</head>
<body>
    <nav class="navbar fixed-top navbar-expand-lg bg-primary"  data-bs-theme="dark" style="padding: 10px 24px;">
        <div class="container-fluid">
            <a class="navbar-brand" href="./index.html">Billing Soft</a>
            
            <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="./index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./invoices.html">Invoices</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="./services.html">Services</a>
                    </li>
                    <li class="nav-item" id="registerMenu">
                        <a class="nav-link active" href="./registerCompany.html">Register</a>
                    </li>

                        <a class="nav-link" type="button" onclick="logOut()">Log Out</a>
                    </li>
                </ul>

        </div>
    </nav>
     <!-- nav bar end -->

     <!-- model ( pop up ) to register new company -->
    <div class="modal" tabindex="-1" id="companyRegisterModel" style="padding: 32px;">
        <div class="modal-dialog modal-lg" style="padding: 32px;">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Add Aditional Payments Recieved</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form style="padding-top: 16px;" onsubmit="companyRegister(); return false; ">
                        <div class="row">
                            <div class="col-md-6">
                                <label for="companyName" style="font-size: 14px;">Company Name</label>
                                <input id="companyName" placeholder="Enter Company Name" class="form-control">
                                <p id="companyNameErrorMessage"></p>
                            </div>
                            <div class="col-md-6">
                                <label for="userName" style="font-size: 14px;" >User Name</label>
                                <input id="userName" placeholder="Enter user name" class="form-control">
                                <p id="userNameErrorMessage"></p>
                            </div>
                                <div class="col-md-6">
                                <label for="email" style="font-size: 14px;">Email</label>
                                <input id="email" class="form-control" placeholder="Enter Email">
                                <p></p> 
                            </div>
                            <div class="col-md-6">
                                <label for="password" style="font-size: 14px;">Password</label>
                                <input id="password" class="form-control" placeholder="Enter Password">
                                <p id="passwordErrorMessage"></p>
                            </div>
                            <div class="row ">
                                <label for="companyLogo" style="padding-bottom: 4px; font-size: 14px;" > Upload Company Logo image</label>
                                <input type="file" accept="image/*" id="companyLogo">
                                <p id="companyLogoErrorMessage"></p>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                                <!-- <button type="button" class="btn btn-primary" onclick="saveAdditionalPayment()">Save Payment</button> -->
                                <button type="submit" class="btn btn-primary">Register as New Company</button>
                                <p id="registerResponsemessage"></p>
                            </div>   
                    </form> 

                </div>
                
                
                
                </div>
            </div>
        </div>
    </div>

    <div style="margin: 96px 32px;">
        <div class="col" style="display: flex; justify-content: space-between; border-bottom: solid 1px rgb(210, 210, 210); margin-bottom: 16px; padding-bottom: 8px;">
            <h3>Companies List</h3>
            <Button class="btn btn-primary" onclick="openCompanyRegisterModel()">Add New Company</Button>
        </div>
        <div>
            <table class="table table-striped" style="padding: 10px 24px;">
                <thead>
                    <tr>
                        <th>Sl.no</th>
                        <th>Company Name</th>
                        <th> Created on</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="companiesListTableBody"></tbody>
            </table>
        </div>
        
    </div>


 

    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
